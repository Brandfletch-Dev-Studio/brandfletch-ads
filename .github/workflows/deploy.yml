name: Deploy to Vercel (manual / fallback only)

# Vercel's native GitHub integration already auto-deploys on every push to main.
# This workflow is now MANUAL-ONLY (workflow_dispatch) so we stop double-deploying
# and burning the free-tier daily deploy quota twice per commit.
on:
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (prod)
        id: deploy
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set +e
          OUTPUT=$(npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          EXIT=$?
          echo "--- Vercel CLI output ---"
          echo "$OUTPUT"
          echo "--- Exit code: $EXIT ---"
          set -e
          if [ $EXIT -ne 0 ]; then
            echo "::error::Vercel deploy failed with exit code $EXIT. See output above."
            exit $EXIT
          fi
