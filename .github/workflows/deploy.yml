name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (prod)
        id: deploy
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set +e
          OUTPUT=$(npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          EXIT=$?
          echo "--- Vercel CLI output ---"
          echo "$OUTPUT"
          echo "--- Exit code: $EXIT ---"
          set -e

          if [ $EXIT -ne 0 ]; then
            echo "::error::Vercel deploy failed with exit code $EXIT. See output above."
            exit $EXIT
          fi

          DEPLOY_URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+-[a-zA-Z0-9-]+\.vercel\.app' | tail -1)
          if [ -z "$DEPLOY_URL" ]; then
            DEPLOY_URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9._/-]+\.vercel\.app' | tail -1)
          fi
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed: $DEPLOY_URL"

      - name: Alias brandfletch.com
        continue-on-error: true
        run: |
          URL="${{ steps.deploy.outputs.deploy_url }}"
          if [ -n "$URL" ]; then
            npx vercel alias set "$URL" brandfletch.com --token=${{ secrets.VERCEL_TOKEN }} || true
          fi

      - name: Done
        run: echo "Live at https://brandfletch.com"
