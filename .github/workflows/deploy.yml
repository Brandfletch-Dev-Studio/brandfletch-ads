name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pull Vercel Environment (production)
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build with Vercel
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verify build output
        run: |
          if [ ! -d ".vercel/output" ]; then
            echo "::error::Vercel build did not produce output"
            exit 1
          fi
          echo "✅ Build output exists"

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1)
          echo "$DEPLOY_OUTPUT"
          # Extract URL — Vercel CLI may output it in different formats
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          if [ -z "$DEPLOY_URL" ]; then
            DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+' | grep 'vercel' | tail -1)
          fi
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          if [ -n "$DEPLOY_URL" ]; then
            echo "✅ Deployed to: $DEPLOY_URL"
          else
            echo "⚠️  Could not extract deployment URL (deploy may still have succeeded)"
          fi

      - name: Alias brandfletch.com
        continue-on-error: true
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"
          if [ -n "$DEPLOY_URL" ]; then
            echo "🔗 Aliasing brandfletch.com → $DEPLOY_URL"
            npx vercel alias set "$DEPLOY_URL" brandfletch.com --token=${{ secrets.VERCEL_TOKEN }} || echo "⚠️  Alias step failed (non-fatal)"
          else
            echo "⚠️  No deploy URL — skipping alias"
          fi

      - name: Done
        run: echo "🚀 Live at https://brandfletch.com"
