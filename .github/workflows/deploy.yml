name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pull Vercel Environment (production)
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build with Vercel
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verify build output
        run: |
          if [ ! -d ".vercel/output" ]; then
            echo "::error::Vercel build did not produce output"
            exit 1
          fi
          echo "✅ Build output exists"

      - name: Deploy to Vercel (production)
        run: |
          # Write output to file instead of command substitution to avoid pipe hanging
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes > deploy_output.txt 2>&1 &
          DEPLOY_PID=$!
          
          # Wait up to 4 minutes
          for i in $(seq 1 48); do
            if ! kill -0 $DEPLOY_PID 2>/dev/null; then
              break
            fi
            sleep 5
          done
          
          # If still running, kill it
          if kill -0 $DEPLOY_PID 2>/dev/null; then
            kill $DEPLOY_PID 2>/dev/null
            echo "::warning::Deploy process still running after 4 min, killing"
          fi
          
          # Show output and extract URL
          cat deploy_output.txt
          DEPLOY_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.vercel\.app' deploy_output.txt | head -1)
          
          if [ -n "$DEPLOY_URL" ]; then
            echo "✅ Deployed to: $DEPLOY_URL"
          else
            echo "::error::No deployment URL found in output"
            exit 1
          fi
        timeout-minutes: 6

      - name: Done
        run: echo "🚀 Production deploy complete"
