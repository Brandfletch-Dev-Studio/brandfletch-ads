name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pull Vercel Environment (production)
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build with Vercel
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verify build output
        run: |
          if [ ! -d ".vercel/output" ]; then
            echo "::error::Vercel build did not produce output"
            exit 1
          fi
          echo "✅ Build output exists"

      - name: Deploy to Vercel (production)
        run: |
          # Deploy and capture the URL, then exit immediately
          DEPLOY_URL=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | grep -oP 'https://[a-zA-Z0-9-]+\.vercel\.app' | head -1)
          
          if [ -z "$DEPLOY_URL" ]; then
            echo "::error::No deployment URL received"
            exit 1
          fi
          
          echo "✅ Deployed to: $DEPLOY_URL"
          echo "::$DEPLOY_URL"
        timeout-minutes: 5

      - name: Done
        run: echo "🚀 Production deploy complete"
